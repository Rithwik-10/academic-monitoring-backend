spring.application.name=academic-monitoring-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/academic_monitoring}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rithwikmysql}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=${PORT:8080}

# Optional OpenAI settings. Leave blank to use the local placeholder AI logic.
openai.api.key=
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini
